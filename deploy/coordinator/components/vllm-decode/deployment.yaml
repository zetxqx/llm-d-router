apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-d
  labels:
    app: ${POOL_NAME}
spec:
  replicas: ${VLLM_REPLICA_COUNT_D}
  selector:
    matchLabels:
      app: ${POOL_NAME}
      llm-d.ai/component: decode
  template:
    metadata:
      labels:
        app: ${POOL_NAME}
        llm-d.ai/component: decode
        llm-d.ai/role: ${DECODE_ROLE}
    spec:
      initContainers: []
      containers:
      - name: vllm
        image: ${VLLM_IMAGE}
        imagePullPolicy: IfNotPresent
        args:
        - "--port=8000"
        - "--model=${MODEL_NAME}"
        - "--data-parallel-size=${VLLM_DATA_PARALLEL_SIZE}"
        - "--force-dummy-tokenizer"
        - "${VLLM_EXTRA_ARGS_D}"
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: PORT
          value: "8000"
        - name: PYTHONHASHSEED
          value: "42"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
      volumes: []
