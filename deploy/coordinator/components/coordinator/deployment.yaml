apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-coordinator
  labels:
    app: llm-d-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-d-coordinator
  template:
    metadata:
      labels:
        app: llm-d-coordinator
    spec:
      serviceAccountName: llm-d-coordinator
      terminationGracePeriodSeconds: 30
      containers:
      - name: coordinator
        image: ${COORDINATOR_IMAGE}
        imagePullPolicy: IfNotPresent
        args:
        - --config
        - /etc/coordinator/coordinator.yaml
        ports:
        - name: http
          containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/coordinator
      volumes:
      - name: config
        configMap:
          name: llm-d-coordinator-config
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-coordinator
  labels:
    app: llm-d-coordinator
spec:
  selector:
    app: llm-d-coordinator
  type: NodePort
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30081
