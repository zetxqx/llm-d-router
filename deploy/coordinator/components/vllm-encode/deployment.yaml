apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-e
  labels:
    app: ${POOL_NAME}
spec:
  replicas: ${VLLM_REPLICA_COUNT_E}
  selector:
    matchLabels:
      app: ${POOL_NAME}
      llm-d.ai/component: encode
  template:
    metadata:
      labels:
        app: ${POOL_NAME}
        llm-d.ai/component: encode
        llm-d.ai/role: encode
    spec:
      initContainers: []
      containers:
      - name: vllm
        image: ${VLLM_IMAGE}
        imagePullPolicy: IfNotPresent
        args:
        - "--model=${MODEL_NAME}"
        - "--port=8000"
        - "--data-parallel-size=${VLLM_DATA_PARALLEL_SIZE}"
        - "--no-enable-prefix-caching"
        - "--mm-encoder-only"
        - "${VLLM_EXTRA_ARGS_E}"
        ports:
        - name: encode-http
          containerPort: 8000
          protocol: TCP
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        env:
        - name: PORT
          value: "8000"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes: []
