apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: llm-d-sim
  name: llm-d-sim
  namespace: llm-d-sim
spec:
  replicas: 10
  selector:
    matchLabels:
      app: llm-d-sim
  template:
    metadata:
      labels:
        app: llm-d-sim
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: llm-d-sim
      containers:
      - args:
        - --model
        - Qwen/Qwen3-8B
        - --port
        - '8000'
        - --max-model-len
        - '131072'
        - --max-num-seqs
        - '256'
        - --max-waiting-queue-length
        - '2048'
        - --inter-token-latency
        - 1ms
        - --prefill-time-per-token
        - 4us
        - --prefill-overhead
        - 5ms
        - --enable-kvcache
        - --kv-cache-size
        - '10000000'
        - --block-size
        - '16'
        - --render-timeout
        - 120s
        - --mm-render-timeout
        - 120s
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.9.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        name: vllm-sim
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 5557
          name: zmq-kv-events
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: '1'
            memory: 8Gi
      initContainers:
      - args:
        - launch
        - render
        - Qwen/Qwen3-8B
        - --port=8082
        - --max-model-len=131072
        command:
        - vllm
        env:
        - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
          value: '1'
        - name: TOKENIZERS_PARALLELISM
          value: 'true'
        - name: OMP_NUM_THREADS
          value: '4'
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: hf-secret
        image: vllm/vllm-openai-cpu:v0.19.1
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 10
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 10
        name: vllm-render
        ports:
        - containerPort: 8082
          name: http-render
          protocol: TCP
        readinessProbe:
          failureThreshold: 10
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: '1'
            memory: 8Gi
        restartPolicy: Always
