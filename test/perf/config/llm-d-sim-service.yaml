apiVersion: v1
kind: Service
metadata:
  name: llm-d-sim-svc
  namespace: llm-d-sim
  labels:
    app: llm-d-sim
spec:
  selector:
    app: llm-d-sim
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      name: http
    - protocol: TCP
      port: 5557
      targetPort: 5557
      name: zmq-kv-events
  type: ClusterIP
